# DEV

services:
  bot:
    build: .
    image: metrik-bot:dev
    container_name: Metrik-Bot-Dev
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      postgres_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - metric-net-dev

  postgres_db:
    image: postgres:18-alpine
    container_name: Metric-DB-Dev
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mentor_db}
      POSTGRES_USER: ${POSTGRES_USER:-db_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-db_password}
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER:-db_user}", "-d", "${POSTGRES_DB:-mentor_db}" ]
      interval: 10s
    ports:
      - "5432:5432"
    networks:
      - metric-net-dev
    volumes:
      - postgres_data_dev:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    container_name: Redis-Metrik-Dev
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
    ports:
      - "6379:6379"
    networks:
      - metric-net-dev
    volumes:
      - redis_data_dev:/data


networks:
  metric-net-dev:
    name: Metrik-Net-Dev
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev: