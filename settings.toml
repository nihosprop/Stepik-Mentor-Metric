# === DEFAULT ===
[default.bot]
parse_mode = 'HTML'

# Logs
[default.logs.dict_config]
version = 1
disable_existing_loggers = false

[default.logs.dict_config.formatters.formatter]
format = '[{asctime}] #{levelname:<8} {filename:<17}:{lineno:4} - <{funcName}> - {message}'
datefmt = '%Y.%m.%d %H:%M:%S'
style = '{'

[default.logs.dict_config.handlers.stdout]
class = 'logging.StreamHandler'
formatter = 'formatter'
stream = 'ext://sys.stdout'

[default.logs.dict_config.root]
handlers = ['stdout']
level = 'DEBUG'

# redis
[default.redis]
port = 6379

# postgres
[default.postgres]
name = 'mentor_db'
port = 5432


# === PRODUCTION ===
# logs
[production.logs.dict_config.handlers.file]
class = 'logging.handlers.RotatingFileHandler'
formatter = 'formatter'
filename = '/app/logs/app.log'
maxBytes = 10485760
backupCount = 3
mode = 'a'

[production.logs.dict_config.root]
handlers = ['stdout', 'file']
level = 'INFO'
